<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Vape Store</title>
  
  <!-- Google Fonts: Anton (Headings) & Montserrat (Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header bg-dark">
    <div class="container">
      <nav class="navbar">
        <div class="navbar__left">
          <input type="checkbox" id="menuToggle" class="navbar__checkbox">
          <label for="menuToggle" class="navbar__toggle">☰</label>
          <ul class="navbar__menu" id="navbarMenu">
            <li class="navbar__item"><a href="index.html" class="navbar__link">Home</a></li>
            <li class="navbar__item"><a href="products.html" class="navbar__link">Products</a></li>
            <li class="navbar__item"><a href="about.html" class="navbar__link">About</a></li>
            <li class="navbar__item"><a href="contact.html" class="navbar__link">Contact</a></li>
          </ul>
        </div>
        <div class="navbar__logo">
          <a href="index.html">
            <img src="assets/images/logodefinitivo.png" alt="Last Hour">
          </a>
        </div>
        <div class="navbar__right">
          <button class="navbar__icon">Account</button>
          <button class="navbar__icon">Cart</button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact page-section">
      <div class="container">
        <h1 class="section-title">Contact</h1>
        
        <div class="contact__panel">
          <form class="contact-form" action="#" method="POST">
            <div class="contact-form__group">
              <label for="name" class="contact-form__label">Full Name</label>
              <input type="text" id="name" name="name" required class="contact-form__control">
            </div>
            
            <div class="contact-form__group">
              <label for="email" class="contact-form__label">Email Address</label>
              <input type="email" id="email" name="email" required class="contact-form__control">
            </div>
            
            <div class="contact-form__group">
              <label for="message" class="contact-form__label">Message</label>
              <textarea id="message" name="message" rows="5" required class="contact-form__control contact-form__control--textarea"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary contact-form__submit">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__content">
      <div class="footer__brand">
        <a href="index.html">
          <img src="assets/images/logoNegro.png" alt="Last Hour logo" class="footer__logo">
        </a>
        <p class="footer__description">Premium disposable vapes with long-lasting flavor.</p>
      </div>
      <div class="footer__links">
        <h4 class="footer__title">Quick Links</h4>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer__contact">
        <h4 class="footer__title">Contact</h4>
        <p>Email: info@lasthour.com</p>
        <p>Phone: +34 674466462</p>
        <p>Location: Madrid, Spain</p>
        <p>Instagram: @lasthour.official</p>
      </div>
    </div>
    <div class="footer__bottom">
      <p>© 2026 Last Hour. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
