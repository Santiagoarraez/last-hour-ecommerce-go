{{define "content"}}
<section class="catalog page-section">
  <div class="container">
    <h1 class="section-title"><i class="fa-solid fa-boxes-stacked"></i> Seller Products</h1>

    <div class="app-toolbar">
      <a href="/seller/products/new" class="btn btn-primary btn-link"><i class="fa-solid fa-plus"></i> Add Product</a>
      <a href="/account" class="btn btn-secondary btn-link"><i class="fa-solid fa-arrow-left"></i> Back to Account</a>
    </div>

    <div class="app-table">
      {{range .Products}}
      <article class="app-row">
        <img src="{{.Image}}" alt="{{.Alt}}" class="app-row__image">
        <div class="app-row__content">
          <h2 class="app-row__title">{{.Name}}</h2>
          <p>{{.Subtitle}}</p>
          <p><strong>Price:</strong> ${{printf "%.2f" .Price}}</p>
        </div>
        <div class="app-actions">
          <a href="/seller/products/edit/{{.ID}}" class="btn btn-secondary btn-link"><i class="fa-solid fa-pen-to-square"></i> Edit</a>
          <form action="/seller/products/delete/{{.ID}}" method="POST">
            <button type="submit" class="btn btn-modern"><i class="fa-solid fa-trash"></i> Delete</button>
          </form>
        </div>
      </article>
      {{end}}
    </div>
  </div>
</section>
{{end}}
