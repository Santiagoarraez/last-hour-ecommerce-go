{{define "content"}}
<article class="product-view">
  <div class="container">
    <header class="product-view__header">
      <div class="product-view__badge">{{.Model.Subtitle}}</div>
      <h1 class="product-view__title">{{.Model.Name}} - {{.Flavor.Name}}</h1>
      <p class="product-view__price">{{printf "%.2f" .Model.Price}}€</p>
    </header>

    <div class="product-view__grid">
      <div class="product-view__gallery">
        <figure class="product-view__main-image">
          <img src="{{ if .Flavor.Image }}{{ .Flavor.Image | safeURL }}{{ else }}/assets/images/hqd-product.png{{ end }}" alt="{{ .Flavor.Name }}" id="main-product-img">
        </figure>
        
        <div class="product-view__thumbnails">
          <!-- El sabor actual -->
          <div class="thumb-link thumb-link--active">
            <img src="{{ if .Flavor.Image }}{{ .Flavor.Image | safeURL }}{{ else }}/assets/images/hqd-product.png{{ end }}" alt="{{ .Flavor.Name }}">
          </div>
          <!-- Otros sabores del mismo modelo -->
          {{range .Siblings}}
          <a href="/products/flavor/{{.ID}}" class="thumb-link">
            <img src="{{ if .Image }}{{ .Image | safeURL }}{{ else }}/assets/images/hqd-product.png{{ end }}" alt="{{ .Name }}">
            <span class="thumb-tooltip">{{.Name}}</span>
          </a>
          {{end}}
        </div>
      </div>

      <section class="product-view__info">
        <h3 class="product-view__subtitle">Sabor</h3>
        <p class="product-view__description" style="font-size:1.1rem; font-weight:600; margin-bottom:1.5rem;">{{.Flavor.Name}}</p>

        <h3 class="product-view__subtitle">Descripción</h3>
        <p class="product-view__description">{{.Model.Description}}</p>

        <form class="product-view__form quick-add-form" id="add-to-cart-form" style="margin-top: 2rem;">
          <input type="hidden" name="product_id" value="{{.Model.ID}}">
          <input type="hidden" name="flavor_id" value="{{.Flavor.ID}}">
          <input type="hidden" name="flavor_name" value="{{.Flavor.Name}}">
          <input type="hidden" name="price" value="{{.Model.Price}}">
          <input type="hidden" name="image" value="{{.Flavor.Image}}">

          <h3 class="product-view__subtitle" style="margin-bottom:0.75rem;">Cantidad</h3>
          <div class="quantity-picker" style="margin-bottom: 1.5rem;">
            <button type="button" class="btn-qty-adj" data-delta="-1">−</button>
            <input class="form-input" type="number" id="cart-quantity" name="quantity" value="1" min="1">
            <button type="button" class="btn-qty-adj" data-delta="1">+</button>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-full">
            <i class="fa-solid fa-cart-plus"></i> Añadir al carrito
          </button>
          <a href="/products" class="btn btn-secondary btn-lg w-full" style="margin-top:10px; display:block; text-align:center;">
            <i class="fa-solid fa-shop"></i> Ver catálogo
          </a>
        </form>
      </section>
    </div>
  </div>
</article>

<script>
  // Script rápido para el picker de cantidad en detalle
  document.querySelectorAll('.btn-qty-adj').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById('cart-quantity');
      if (!input) return;
      const delta = parseInt(btn.dataset.delta);
      const newVal = parseInt(input.value) + delta;
      if (newVal >= 1) input.value = newVal;
    });
  });
</script>
{{end}}
