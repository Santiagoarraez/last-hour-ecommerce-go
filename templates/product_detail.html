{{define "content"}}
<article class="product-view">
  <div class="container">
    <header class="product-view__header">
      <h1 class="product-view__title">{{.Product.Name}}</h1>
      <p class="product-view__price">{{printf "%.2f" .Product.Price}}€</p>
    </header>

    <div class="product-view__grid">
      <div class="product-view__gallery">
        <figure class="product-view__main-image">
          <img src="{{.Product.Image}}" alt="{{.Product.Alt}}" id="main-product-img">
        </figure>
        
        {{if .Variants}}
        <div class="product-view__thumbnails">
          <a href="/products/{{.Product.ID}}" class="thumb-link thumb-link--active">
            <img src="{{.Product.Image}}" alt="{{.Product.Name}}">
          </a>
          {{range .Variants}}
          <a href="/products/{{.ID}}" class="thumb-link">
            <img src="{{.Image}}" alt="{{.Name}}">
            <span class="thumb-tooltip">{{.Name}}</span>
          </a>
          {{end}}
        </div>
        {{end}}
      </div>

      <section class="product-view__info">
        <p class="product-view__description">{{.Product.Description}}</p>

        <form class="product-view__form quick-add-form" id="add-to-cart-form">
          <input type="hidden" name="product_id" value="{{.Product.ID}}">
          {{range .Product.Flavors}}<input type="hidden" name="flavor" value="{{.}}">{{end}}
          
          <div class="form-group form-group--inline">
            <label class="form-label" for="quantity">Quantity</label>
            <div class="quantity-picker">
              <button type="button" class="btn-qty-adj" data-delta="-1">-</button>
              <input class="form-input" type="number" id="cart-quantity" name="quantity" value="1" min="1">
              <button type="button" class="btn-qty-adj" data-delta="1">+</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-full">
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
          </button>
        </form>
      </section>
    </div>
  </div>
</article>

<div id="toast-container" class="toast-container"></div>
<script src="/js/cart.js"></script>

<script>
  // Script rápido para el picker de cantidad en detalle
  document.querySelectorAll('.btn-qty-adj').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById('cart-quantity');
      const delta = parseInt(btn.dataset.delta);
      const newVal = parseInt(input.value) + delta;
      if (newVal >= 1) input.value = newVal;
    });
  });
</script>
{{end}}
