{{define "content"}}
<section class="about page-section">
  <div class="container">
    <h1 class="section-title"><i class="fa-solid fa-user-gear"></i> My Account</h1>

    {{if .Success}}
    <div class="alert alert-success"><i class="fa-solid fa-circle-check"></i> {{.Success}}</div>
    {{end}}
    {{if .Error}}
    <div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> {{.Error}}</div>
    {{end}}

    <div id="account-notification" class="dashboard__notification" hidden></div>

    <div class="app-grid">
      <section class="app-panel">
        <h2 class="app-panel__title">Profile Details</h2>
        <form id="account-form" class="form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="acc-name" name="name" value="{{.User.Name}}" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="acc-email" name="email" value="{{.User.Email}}" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="acc-phone" name="phone" value="{{.User.Phone}}" class="form-input" placeholder="+34 ...">
          </div>
          <div class="form-group">
            <label>Role</label>
            <input type="text" value="{{.User.Role}}" class="form-input" disabled>
            <small>Roles can only be changed by administrators.</small>
          </div>
          <button type="submit" id="btn-save-account" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Changes</button>
        </form>
      </section>

      <section class="app-panel">
        <h2 class="app-panel__title">Actions</h2>
        <div class="app-actions">
          <a href="/cart" class="btn btn-primary btn-link">
            <i class="fa-solid fa-cart-shopping"></i> View Cart
          </a>
          {{if .User.IsSeller}}
          <a href="/seller/dashboard" class="btn btn-secondary btn-link">
            <i class="fa-solid fa-store"></i> Admin Panel
          </a>
          {{end}}
          <form action="/logout" method="POST" class="w-full">
            <button type="submit" class="btn btn-modern w-full">
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
          </form>
        </div>
      </section>
    </div>
    <script src="/js/account.js"></script>
  </div>
</section>
{{end}}
