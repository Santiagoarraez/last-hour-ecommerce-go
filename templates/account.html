{{define "content"}}
<section class="about page-section">
  <div class="container">
    <h1 class="section-title">My Account</h1>

    <div class="app-grid">
      <section class="app-panel">
        <h2 class="app-panel__title">Profile</h2>
        <p><strong>Name:</strong> {{.User.Name}}</p>
        <p><strong>Email:</strong> {{.User.Email}}</p>
        <p><strong>Role:</strong> {{.User.Role}}</p>
      </section>

      <section class="app-panel">
        <h2 class="app-panel__title">Actions</h2>
        <div class="app-actions">
          <a href="/cart" class="btn btn-primary btn-link">View Cart</a>
          {{if .User.IsSeller}}
          <a href="/seller/products" class="btn btn-secondary btn-link">Seller Panel</a>
          {{end}}
          <form action="/logout" method="POST">
            <button type="submit" class="btn btn-modern">Logout</button>
          </form>
        </div>
      </section>
    </div>
  </div>
</section>
{{end}}
