{{define "content"}}
<section class="contact page-section">
  <div class="container">
    <h1 class="section-title"><i class="fa-solid fa-headset"></i> Contact</h1>

    <div class="contact__panel">
      {{if .Success}}
      <p class="about__paragraph"><strong>Message sent correctly.</strong> The server has processed and stored your request.</p>
      {{end}}

      {{if .Error}}
      <p class="about__paragraph"><strong>Error:</strong> {{.Error}}</p>
      {{end}}

      <form class="contact-form" action="/contact" method="POST">
        <div class="contact-form__group">
          <label for="name" class="contact-form__label">Full Name</label>
          <input type="text" id="name" name="name" required class="contact-form__control">
        </div>

        <div class="contact-form__group">
          <label for="email" class="contact-form__label">Email Address</label>
          <input type="email" id="email" name="email" required class="contact-form__control">
        </div>

        <div class="contact-form__group">
          <label for="message" class="contact-form__label">Message</label>
          <textarea id="message" name="message" rows="5" required
            class="contact-form__control contact-form__control--textarea"></textarea>
        </div>

        <button type="submit" class="btn btn-primary contact-form__submit"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
      </form>
    </div>
  </div>
</section>
{{end}}
