{{define "content"}}
<section class="catalog page-section">
  <div class="container">
    <h1 class="section-title"><i class="fa-solid fa-shop"></i> All Our Vapes</h1>

    <div class="featured__grid">
      {{range .Products}}
      <div class="product-card">
        <div class="product-card__image-wrapper">
          <img src="{{.Image}}" alt="{{.Alt}}" class="product-card__image">
        </div>
        <h3 class="product-card__title">{{.Name}}</h3>
        <p class="product-card__flavors">{{.Subtitle}}</p>
        <p class="product-card__price">{{printf "%.2f" .Price}}€</p>
        <a href="/products/{{.ID}}" class="btn btn-primary btn-link"><i class="fa-solid fa-eye"></i> View Details</a>
      </div>
      {{end}}
    </div>
  </div>
</section>
{{end}}
